@if (isVisible()) {
  <div [class]="getToastClasses()" role="alert" aria-live="polite">
    <div class="flex items-start">
      <!-- Icône -->
      <div class="flex-shrink-0">
        <span class="text-2xl">{{ getIcon() }}</span>
      </div>
      
      <!-- Contenu -->
      <div class="ml-3 flex-1">
        <!-- Titre -->
        <h3 [class]="'text-sm font-medium mb-1 ' + getTitleClass()">
          {{ currentToast?.title }}
        </h3>
        
        <!-- Message -->
        <p [class]="'text-sm ' + getMessageClass()">
          {{ currentToast?.message }}
        </p>
        
        <!-- Action -->
        @if (currentToast?.action) {
          <div class="mt-3">
            <button 
              (click)="executeAction()"
              class="text-sm font-medium underline hover:no-underline focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 rounded"
              [class]="'hover:' + getTitleClass()">
              <div *ngIf="currentToast && currentToast.action">
  {{ currentToast.action.label }}
</div>
            </button>
          </div>
        }
      </div>
      
      <!-- Bouton de fermeture -->
      <div class="ml-4 flex-shrink-0">
        <button 
          (click)="dismiss()"
          class="inline-flex text-gray-400 hover:text-gray-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 rounded"
          aria-label="Fermer">
          <svg class="h-5 w-5" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"/>
          </svg>
        </button>
      </div>
    </div>
    
    <!-- Barre de progression -->
    <div class="mt-3">
      <div 
        class="h-1 bg-gray-200 rounded-full overflow-hidden"
        [attr.aria-label]="'Notification dismiss in ' + (currentToast?.duration || 0) + 'ms'">
        <div 
          class="h-full bg-current opacity-30 rounded-full transition-all ease-linear"
          [style.animation]="'shrink ' + (currentToast?.duration || 0) + 'ms linear forwards'">
        </div>
      </div>
    </div>
  </div>
}
