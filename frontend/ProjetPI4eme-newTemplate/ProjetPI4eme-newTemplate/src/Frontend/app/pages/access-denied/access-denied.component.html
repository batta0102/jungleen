<div class="min-h-screen bg-gradient-to-br from-red-50 to-orange-50 flex items-center justify-center px-4">
  <div class="max-w-md w-full">
    <div class="bg-white rounded-2xl shadow-xl p-8 text-center">
      <!-- Icône d'erreur -->
      <div class="mb-6">
        <div class="mx-auto w-20 h-20 bg-red-100 rounded-full flex items-center justify-center">
          <span class="text-4xl">🚫</span>
        </div>
      </div>

      <!-- Titre -->
      <h1 class="text-3xl font-bold text-gray-900 mb-2">Accès Refusé</h1>
      <p class="text-gray-600 mb-8">
        Vous n'avez pas les permissions nécessaires pour accéder à cette page.
      </p>

      <!-- Description -->
      <div class="bg-red-50 border border-red-200 rounded-lg p-4 mb-8">
        <p class="text-red-800 text-sm">
          Cette page est réservée aux administrateurs. Si vous pensez qu'il s'agit d'une erreur, veuillez contacter le support technique.
        </p>
      </div>

      <!-- Boutons d'action -->
      <div class="space-y-4">
        <button 
          (click)="goHome()" 
          class="w-full px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors font-medium">
          Retour à l'accueil
        </button>
        
        <button 
          (click)="goBack()" 
          class="w-full px-6 py-3 bg-gray-200 text-gray-800 rounded-lg hover:bg-gray-300 transition-colors font-medium">
          Page précédente
        </button>
      </div>

      <!-- Informations supplémentaires -->
      <div class="mt-8 pt-6 border-t border-gray-200">
        <p class="text-gray-500 text-sm">
          Besoin d'aide ? Contactez l'administrateur système.
        </p>
      </div>
    </div>
  </div>
</div>
