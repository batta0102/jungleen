<main class="mx-auto max-w-4xl px-6 py-8">

  <!-- FORM CONTENT -->

    <header class="mb-8">
      <h1 class="font-serif text-4xl font-semibold text-text mb-2">Edit Club</h1>
      <p class="text-secondary">Update club information</p>
    </header>

    <!-- ERROR MESSAGE -->
    <div *ngIf="errorMessage" class="mb-6 p-4 bg-red-50 border border-red-200 rounded-lg text-red-700">
      {{ errorMessage }}
    </div>

    <!-- DEBUG INFO -->
    <div *ngIf="club" class="mb-4 p-3 bg-gray-50 rounded text-sm text-gray-600">
      Debug: Club ID = {{ clubId }}, Club Name = {{ club.nom }}
    </div>
    
    <!-- DEBUG INFO - No club data -->
    <div class="mb-4 p-3 bg-yellow-50 rounded text-sm text-yellow-600">
      Debug: No club data available - clubId = {{ clubId }}
    </div>

    <!-- EDIT FORM -->
    <div class="bg-white rounded-lg shadow-md p-8 border border-gray-200">
      <form (ngSubmit)="updateClub()">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <!-- Club Name -->
          <div class="md:col-span-2">
            <label class="block text-sm font-medium text-gray-700 mb-2">
              Club Name *
            </label>
            <input 
              type="text" 
              [(ngModel)]="club.nom" 
              name="nom"
              required
              class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:border-primary focus:ring-2 focus:ring-primary focus:ring-opacity-20"
              placeholder="Enter club name">
          </div>

          <!-- Description -->
          <div class="md:col-span-2">
            <label class="block text-sm font-medium text-gray-700 mb-2">
              Description *
            </label>
            <textarea 
              [(ngModel)]="club.description" 
              name="description"
              required
              rows="4"
              class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:border-primary focus:ring-2 focus:ring-primary focus:ring-opacity-20"
              placeholder="Enter club description"></textarea>
          </div>

          <!-- Level -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">
              Level
            </label>
            <select 
              [(ngModel)]="club.niveau" 
              name="niveau"
              class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:border-primary focus:ring-2 focus:ring-primary focus:ring-opacity-20">
              <option *ngFor="let niveau of niveaux" [value]="niveau">
                {{ niveau }}
              </option>
            </select>
          </div>

          <!-- Max Capacity -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">
              Maximum Capacity
            </label>
            <input 
              type="number" 
              [(ngModel)]="club.capacityMax" 
              name="capacityMax"
              min="1"
              class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:border-primary focus:ring-2 focus:ring-primary focus:ring-opacity-20"
              placeholder="Enter maximum capacity">
          </div>

          <!-- Status -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">
              Status
            </label>
            <select 
              [(ngModel)]="club.status" 
              name="status"
              class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:border-primary focus:ring-2 focus:ring-primary focus:ring-opacity-20">
              <option value="ACTIVE">Active</option>
              <option value="INACTIVE">Inactive</option>
            </select>
          </div>
        </div>

        <!-- ACTION BUTTONS -->
        <div class="mt-8 flex justify-end gap-4">
          <button 
            type="button"
            (click)="cancel()"
            class="px-6 py-3 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 transition-colors">
            Cancel
          </button>
          <button 
            type="submit"
            class="px-6 py-3 bg-primary text-white rounded-lg hover:bg-primary-hover transition-colors disabled:opacity-50">
          </button>
        </div>
      </form>
  s</div>
</main>
