<div class="create-club-container p-6">
  <!-- Back Button -->
  <div class="mb-6">
    <a 
      routerLink="/back/clubs" 
      class="inline-flex items-center text-gray-600 hover:text-gray-900 transition-colors group">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2 transform group-hover:-translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
      </svg>
      Back to Clubs
    </a>
  </div>

  <!-- Header -->
  <div class="mb-8">
    <h1 class="text-3xl font-bold text-gray-800">Create New Club</h1>
    <p class="text-gray-600 mt-2">Fill in the details below to create your club</p>
  </div>

  <!-- Form Card -->
  <div class="bg-white rounded-xl shadow-md p-8 max-w-3xl">
    <form [formGroup]="clubForm" (ngSubmit)="onSubmit()">

      <!-- Club Name -->
      <div class="mb-6">
        <label class="block text-sm font-semibold text-gray-700 mb-2">
          Club Name <span class="text-red-500">*</span>
        </label>
        <input
          type="text"
          formControlName="nom"
          class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent"
          [class.border-red-500]="isFieldInvalid('nom')"
          placeholder="e.g., English Conversation Club"
        >
        <div class="text-red-500 text-sm mt-1" *ngIf="isFieldInvalid('nom')">
          Club name is required (min. 3 characters)
        </div>
      </div>

      <!-- Description -->
      <div class="mb-6">
        <label class="block text-sm font-semibold text-gray-700 mb-2">
          Description <span class="text-red-500">*</span>
        </label>
        <textarea
          formControlName="description"
          rows="5"
          class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent"
          [class.border-red-500]="isFieldInvalid('description')"
          placeholder="Describe what your club is about..."
        ></textarea>
        <div class="text-red-500 text-sm mt-1" *ngIf="isFieldInvalid('description')">
          Description is required (min. 20 characters)
        </div>
      </div>

      <!-- Level -->
      <div class="mb-6">
        <label class="block text-sm font-semibold text-gray-700 mb-2">
          English Level <span class="text-red-500">*</span>
        </label>
        <select
          formControlName="niveau"
          class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent"
          [class.border-red-500]="isFieldInvalid('niveau')"
        >
          <option value="" disabled selected>Select a level</option>
          <option value="BEGINNER">Beginner</option>
          <option value="INTERMEDIATE">Intermediate</option>
          <option value="ADVANCED">Advanced</option>
          <option value="ALL_LEVELS">All Levels Welcome</option>
        </select>
        <div class="text-red-500 text-sm mt-1" *ngIf="isFieldInvalid('niveau')">
          Please select a level
        </div>
      </div>

      <!-- Capacity -->
      <div class="mb-6">
        <label class="block text-sm font-semibold text-gray-700 mb-2">
          Maximum Capacity <span class="text-red-500">*</span>
        </label>
        <input
          type="number"
          formControlName="capacityMax"
          min="5"
          max="100"
          class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent"
          [class.border-red-500]="isFieldInvalid('capacityMax')"
        >
        <div class="text-red-500 text-sm mt-1" *ngIf="isFieldInvalid('capacityMax')">
          Capacity must be between 5 and 100
        </div>
      </div>

      <!-- Icon Selector -->
      <div class="mb-8">
        <label class="block text-sm font-semibold text-gray-700 mb-2">Club Icon (Optional)</label>
        <div class="flex flex-wrap gap-3">
          <button
            type="button"
            *ngFor="let icon of availableIcons"
            class="w-14 h-14 text-2xl border-2 rounded-xl hover:border-primary transition-all"
            [class.border-primary]="selectedIcon === icon"
            [class.bg-primary/10]="selectedIcon === icon"
          (click)="selectIcon(icon)"
          >
          {{ icon }}
          </button>
        </div>
      </div>

      <!-- Form Actions -->
      <div class="flex justify-end gap-4 pt-6 border-t">
        <button
          type="button"
          class="px-6 py-3 border rounded-lg hover:bg-gray-50 transition-colors"
          (click)="onCancel()"
        >
          Cancel
        </button>
        <button
          type="submit"
          class="px-6 py-3 bg-primary text-white rounded-lg hover:bg-primary-hover transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
          [disabled]="clubForm.invalid || isSubmitting"
        >
          <span *ngIf="!isSubmitting">Create Club</span>
          <span *ngIf="isSubmitting" class="flex items-center gap-2">
            <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            Creating...
          </span>
        </button>
      </div>
    </form>
  </div>
</div>
