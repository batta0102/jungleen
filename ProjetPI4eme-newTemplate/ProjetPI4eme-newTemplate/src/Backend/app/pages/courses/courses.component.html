<main class="mx-auto max-w-7xl px-6 py-8">
  <header class="mb-8 flex items-start justify-between">
    <div>
      <h1 class="font-serif text-5xl font-semibold text-text">Course Management</h1>
      <p class="mt-2 text-secondary">Manage your academic programs and learning sessions.</p>
    </div>
    <div>
      <button class="inline-flex items-center gap-3 bg-primary text-white px-5 py-3 rounded-lg shadow-md hover:bg-primary-hover">
        <span class="text-xl">+</span>
        New Course
      </button>
    </div>
  </header>

  <div class="border-b border-border pb-4 mb-6">
    <nav class="flex gap-8 text-sm text-secondary">
      <a class="border-b-2 border-primary pb-2 text-primary font-semibold">All Courses</a>
      <a class="pb-2 hover:text-text">Active Sessions</a>
      <a class="pb-2 hover:text-text">Associations</a>
    </nav>
  </div>

  <div class="grid grid-cols-1 gap-4 md:grid-cols-3 items-center mb-6">
    <div class="md:col-span-2">
      <div class="flex items-center gap-4">
        <div class="relative w-full">
          <span class="absolute left-4 top-1/2 -translate-y-1/2 text-secondary">🔍</span>
          <input placeholder="Search courses..." class="w-full pl-12 pr-4 py-3 rounded-lg border border-border placeholder-secondary" />
        </div>
      </div>
    </div>
    <div class="flex gap-4 justify-end">
      <select class="px-4 py-3 rounded-lg border border-border bg-white">
        <option>All Levels</option>
      </select>
      <select class="px-4 py-3 rounded-lg border border-border bg-white">
        <option>All Statuses</option>
      </select>
    </div>
  </div>

  <div class="grid grid-cols-1 gap-6 md:grid-cols-2 lg:grid-cols-3">
    <app-course-card *ngFor="let c of courses" [title]="c.title" [instructor]="c.instructor" [students]="c.students" [sessions]="c.sessions" [progress]="c.progress" [status]="c.status"></app-course-card>
  </div>

  <app-empty-state *ngIf="courses.length === 0" title="No courses available" description="Check back soon for new courses" emoji="📚"></app-empty-state>
</main>
