spring.application.name=jungledraft
server.port=${JUNGLEDRAFT_PORT:9090}

# ============ DATABASE CONFIG ============
spring.datasource.url=jdbc:mysql://localhost:3306/club_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

# ============ JPA/HIBERNATE CONFIG ============
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.healthcheck.enabled=true
eureka.client.registry-fetch-interval-seconds=10
eureka.client.initial-instance-info-replication-interval-seconds=10
eureka.client.eureka-server-connect-timeout-seconds=5
eureka.client.eureka-server-read-timeout-seconds=8
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true
eureka.instance.lease-renewal-interval-in-seconds=10
eureka.instance.lease-expiration-duration-in-seconds=30

# OpenFeign Configuration
feign.client.config.default.connect-timeout=5000
feign.client.config.default.read-timeout=5000
feign.client.config.default.logger-level=basic
logging.level.tn.esprit.jungledraft.client=DEBUG

app.upload.dir=uploads/photos
app.photo.max-size=5242880
app.photo.allowed-formats=jpg,jpeg,png
app.ocr.tesseract-executable=C:/Program Files/Tesseract-OCR/tesseract.exe
app.ocr.tessdata-dir=C:/Users/baya1/AppData/Local/TesseractOCR/tessdata