apiVersion: apps/v1
kind: Deployment
metadata:
  name: jungledraft-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jungledraft
  template:
    metadata:
      labels:
        app: jungledraft
    spec:
      containers:
        - name: jungledraft
          image: nouhasd/jungledraft:latest
          ports:
            - containerPort: 9090
---
apiVersion: v1
kind: Service
metadata:
  name: jungledraft-service
spec:
  type: NodePort
  selector:
    app: jungledraft
  ports:
    - port: 9090
      targetPort: 9090
      nodePort: 30007
