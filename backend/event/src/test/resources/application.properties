spring.application.name=event-test
server.port=8099
# In-memory DB for tests (avoids requiring local MySQL)
spring.datasource.url=jdbc:h2:mem:eventdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=


spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Avoid network calls during tests
eureka.client.enabled=false
spring.cloud.discovery.enabled=false
