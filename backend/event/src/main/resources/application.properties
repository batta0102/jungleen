spring.application.name=event
server.port=${EVENT_SERVER_PORT:8082}

spring.datasource.url=${EVENT_DB_URL:jdbc:mysql://localhost:3306/events?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${EVENT_DB_USERNAME:root}
spring.datasource.password=${EVENT_DB_PASSWORD:}
spring.jpa.show-sql=${EVENT_SHOW_SQL:true}
spring.jpa.hibernate.ddl-auto=${EVENT_DDL_AUTO:update}

# Uploads
event.upload-dir=${EVENT_UPLOAD_DIR:./uploads}

# Payments
payment.provider=${PAYMENT_PROVIDER:stripe}
stripe.secret-key=${STRIPE_SECRET_KEY:}
stripe.publishable-key=${STRIPE_PUBLISHABLE_KEY:}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}
payment.frontend-base-url=${FRONTEND_BASE_URL:http://localhost:4200/front}

# H2 console (dev only)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Eureka Configuration
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=${EUREKA_URL:http://eureka:8761/eureka/}
eureka.client.healthcheck.enabled=true
eureka.client.registry-fetch-interval-seconds=10
eureka.client.initial-instance-info-replication-interval-seconds=10
eureka.client.eureka-server-connect-timeout-seconds=5
eureka.client.eureka-server-read-timeout-seconds=8
eureka.instance.hostname=${EUREKA_INSTANCE_HOSTNAME:event-service}
eureka.instance.prefer-ip-address=true
eureka.instance.lease-renewal-interval-in-seconds=10
eureka.instance.lease-expiration-duration-in-seconds=30

spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/myrealm}

# OpenFeign Configuration
feign.client.config.default.connect-timeout=5000
feign.client.config.default.read-timeout=5000
feign.client.config.default.encoder=org.springframework.cloud.openfeign.support.SpringEncoder
feign.client.config.default.decoder=org.springframework.cloud.openfeign.support.ResponseEntityDecoder
feign.client.config.default.error-decoder=org.springframework.cloud.openfeign.support.ResponseEntityDecoder

# Feign logging
logging.level.org.springframework.cloud.openfeign.ribbon=DEBUG
logging.level.tn.esprit.event.client=DEBUG

# Swagger / OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui/index.html
