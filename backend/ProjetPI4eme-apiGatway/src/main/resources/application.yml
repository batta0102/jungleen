spring:
  application:
    name: ApiGatway

server:
  port: 8085

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

logging:
  level:
    root: WARN
    org.springframework.cloud.gateway: INFO
    org.springframework.web: INFO
