# ============================================================
# Kubernetes Manifests — PiDraft (App + MySQL only)
# Apply with: kubectl apply -f k8s-manifests.yaml
# ============================================================

---
# ─────────────────────────────────────────
# NAMESPACE
# ─────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: pidraft

---
# ─────────────────────────────────────────
# CONFIG MAP — Spring Boot env vars
# ─────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: pidraft
data:
  SPRING_DATASOURCE_URL: "jdbc:mysql://mysql-service:3306/PiDraft?createDatabaseIfNotExist=true"
  SPRING_JPA_HIBERNATE_DDL_AUTO: "update"
  SERVER_PORT: "8082"

---
# ─────────────────────────────────────────
# SECRET — DB credentials
# ─────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: db-secret
  namespace: pidraft
type: Opaque
stringData:
  MYSQL_ROOT_PASSWORD: "root"
  SPRING_DATASOURCE_USERNAME: "root"
  SPRING_DATASOURCE_PASSWORD: "root"

---
# ══════════════════════════════════════════
# MYSQL
# ══════════════════════════════════════════
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-pvc
  namespace: pidraft
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: pidraft
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: MYSQL_ROOT_PASSWORD
            - name: MYSQL_DATABASE
              value: PiDraft
          volumeMounts:
            - name: mysql-storage
              mountPath: /var/lib/mysql
          readinessProbe:
            exec:
              command: ["mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
            initialDelaySeconds: 20
            periodSeconds: 10
      volumes:
        - name: mysql-storage
          persistentVolumeClaim:
            claimName: mysql-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: mysql-service
  namespace: pidraft
spec:
  selector:
    app: mysql
  ports:
    - port: 3306
      targetPort: 3306

---
# ══════════════════════════════════════════
# SPRING BOOT APP
# ══════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pidraft-app
  namespace: pidraft
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pidraft-app
  template:
    metadata:
      labels:
        app: pidraft-app
    spec:
      containers:
        - name: pidraft-app
          image: pidraft-app:latest          # replace with your registry image
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8082
          envFrom:
            - configMapRef:
                name: app-config
          env:
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: SPRING_DATASOURCE_USERNAME
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: SPRING_DATASOURCE_PASSWORD
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 60
            periodSeconds: 15

---
apiVersion: v1
kind: Service
metadata:
  name: pidraft-app-service
  namespace: pidraft
spec:
  type: NodePort
  selector:
    app: pidraft-app
  ports:
    - port: 8081
      targetPort: 8082
      nodePort: 30081
