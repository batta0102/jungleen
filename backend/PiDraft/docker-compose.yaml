version: '3.8'

services:

  # ─────────────────────────────────────────
  # MySQL
  # ─────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: pidraft-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: PiDraft
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - pidraft-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # Spring Boot App
  # ─────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pidraft-app
    restart: unless-stopped
    ports:
      - "8081:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/PiDraft?createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SERVER_PORT: 8082
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - pidraft-net

  # ─────────────────────────────────────────
  # SonarQube
  # ─────────────────────────────────────────
  sonarqube:
    image: sonarqube:10-community
    container_name: pidraft-sonar
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonar-db:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_extensions:/opt/sonarqube/extensions
    depends_on:
      - sonar-db
    networks:
      - pidraft-net

  sonar-db:
    image: postgres:15
    container_name: pidraft-sonar-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonar
    volumes:
      - sonar_postgres_data:/var/lib/postgresql/data
    networks:
      - pidraft-net

  # ─────────────────────────────────────────
  # Nexus Repository
  # ─────────────────────────────────────────
  nexus:
    image: sonatype/nexus3:latest
    container_name: pidraft-nexus
    restart: unless-stopped
    ports:
      - "8083:8081"
    volumes:
      - nexus_data:/nexus-data
    networks:
      - pidraft-net

# ─────────────────────────────────────────
# Volumes
# ─────────────────────────────────────────
volumes:
  mysql_data:
  sonarqube_data:
  sonarqube_logs:
  sonarqube_extensions:
  sonar_postgres_data:
  nexus_data:

# ─────────────────────────────────────────
# Network
# ─────────────────────────────────────────
networks:
  pidraft-net:
    driver: bridge