spring.application.name=gestioncours
server.port=8098

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/gestioncours?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyJpaCompliantImpl

# Sketchfab Data API v3 (recherche modèles) — token optionnel : Authorization: Token …
sketchfab.data-api.base-url=https://api.sketchfab.com
sketchfab.data-api.token=

# Handshake WebSocket STOMP (dev Angular) — séparateur virgule
app.websocket.allowed-origins=http://localhost:4200,http://127.0.0.1:4200

# Date Format
spring.jackson.date-format=yyyy-MM-dd
spring.jackson.time-zone=UTC

# Booking overload business thresholds
booking.overload.weekly-limit-hours=20
booking.overload.daily-warning-hours=6
booking.overload.session-duration-hours=2

# --- TEMP (auth): ID utilisateur simule pour /api/notifications/* — garder jusqu'au branchement JWT / Spring Security, puis supprimer cette ligne ou l'injecter depuis le token ---
notifications.debug-user-id=1
# --- TEMP DEBUG: GET /api/debug/notifications = statut ; POST = creation si true — remettre false avant prod ---
notifications.debug-create-endpoint-enabled=false
# Destinataire des notifications auto « cours créé / modifié » (démo : même utilisateur que la cloche REST)
notifications.course-event-recipient-user-id=1

# Eureka Discovery Service Configuration
eureka.client.enabled=true
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.instance-id=${spring.application.name}:${spring.application.instance-id:${random.value}}
eureka.instance.prefer-ip-address=true
eureka.instance.health-check-url-path=/actuator/health
eureka.instance.status-page-url-path=/actuator/info
