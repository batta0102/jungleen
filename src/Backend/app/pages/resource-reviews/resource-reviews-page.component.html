<div class="resource-reviews-page">
  <!-- Header -->
  <div class="page-header">
    <div class="header-content">
      <button class="btn-back" (click)="goBack()">
        ← Back to Resources
      </button>
      <h1 class="page-title">Reviews for Resource #{{ resourceId() }}</h1>
    </div>
    <button 
      class="btn btn-primary"
      (click)="toggleAddForm()"
      [disabled]="loading()"
    >
      {{ showAddForm() ? 'Cancel' : '+ Add Review' }}
    </button>
  </div>

  <!-- Error Message -->
  <div *ngIf="error()" class="alert alert-danger">
    {{ error() }}
  </div>

  <!-- Loading Spinner -->
  <div *ngIf="loading()" class="loading-spinner">
    <div class="spinner"></div>
    <p>Loading...</p>
  </div>

  <!-- Add Review Form -->
  <div *ngIf="showAddForm()" class="review-form-card">
    <h3>Add New Review</h3>
    <form (ngSubmit)="submitNewReview()">
      <div class="form-group">
        <label for="new-rating">Rating</label>
        <app-star-rating
          [(ngModel)]="newReview().rating"
          name="rating"
          [maxStars]="6"
        ></app-star-rating>
      </div>

      <div class="form-group">
        <label for="new-comment">Comment</label>
        <textarea
          id="new-comment"
          [(ngModel)]="newReview().comment"
          name="comment"
          rows="4"
          placeholder="Share your thoughts..."
          class="form-control"
          required
        ></textarea>
      </div>

      <div class="form-actions">
        <button type="button" class="btn btn-secondary" (click)="toggleAddForm()">
          Cancel
        </button>
        <button type="submit" class="btn btn-success" [disabled]="loading()">
          Submit Review
        </button>
      </div>
    </form>
  </div>

  <!-- Reviews List -->
  <div class="reviews-container">
    <h2 class="section-title">All Reviews ({{ reviews().length }})</h2>

    <div *ngIf="reviews().length === 0 && !loading()" class="empty-state">
      <p>No reviews yet. Be the first to review this resource!</p>
    </div>

    <div class="reviews-list">
      <div 
        *ngFor="let review of reviews()" 
        class="review-card"
        [class.editing]="editingReview()?.idReview === review.idReview"
      >
        <!-- View Mode -->
        <div *ngIf="editingReview()?.idReview !== review.idReview" class="review-view">
          <div class="review-header">
            <div class="review-rating">
              <app-star-rating
                [ngModel]="review.rating"
                [readonly]="true"
                [maxStars]="6"
              ></app-star-rating>
              <span class="rating-text">{{ review.rating }}/6</span>
            </div>
            <div class="review-actions">
              <button 
                class="btn btn-sm btn-warning" 
                (click)="startEdit(review)"
                [disabled]="loading()"
              >
                Edit
              </button>
              <button 
                class="btn btn-sm btn-danger" 
                (click)="deleteReview(review.idReview)"
                [disabled]="loading()"
              >
                Delete
              </button>
            </div>
          </div>
          <p class="review-comment">{{ review.comment }}</p>
          <div class="review-meta">
            <small>Review ID: {{ review.idReview }}</small>
          </div>
        </div>

        <!-- Edit Mode -->
        <div *ngIf="editingReview()?.idReview === review.idReview" class="review-edit">
          <h4>Edit Review</h4>
          <form (ngSubmit)="submitEdit()">
            <div class="form-group">
              <label>Rating</label>
              <app-star-rating
                [(ngModel)]="editingReview()!.rating"
                name="edit-rating"
                [maxStars]="6"
              ></app-star-rating>
            </div>

            <div class="form-group">
              <label for="edit-comment">Comment</label>
              <textarea
                id="edit-comment"
                [(ngModel)]="editingReview()!.comment"
                name="edit-comment"
                rows="4"
                class="form-control"
                required
              ></textarea>
            </div>

            <div class="form-actions">
              <button type="button" class="btn btn-secondary" (click)="cancelEdit()">
                Cancel
              </button>
              <button type="submit" class="btn btn-success" [disabled]="loading()">
                Save Changes
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
