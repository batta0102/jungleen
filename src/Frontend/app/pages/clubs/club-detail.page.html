<div class="container">
  <header class="club-header">
    <button class="btn btn-ghost" type="button" (click)="back()">Back</button>

    <div class="crumb" aria-label="Breadcrumb">
      <span class="crumb-line" aria-hidden="true"></span>
      <span class="crumb-text">Clubs</span>
    </div>
  </header>

  @if (club(); as club) {
    <section class="club-intro">
      <h1 class="club-title">📣 {{ club.name }}</h1>
      <p class="muted club-lead">{{ club.details }}</p>

      <div class="club-cta">
        @if (joined()) {
          <span class="pill">Place booked</span>
        } @else {
          <button class="btn btn-primary" type="button" (click)="bookPlace()">Book a place</button>
        }
      </div>
    </section>

    <section class="hero" aria-label="Club gallery">
      <div class="hero-frame">
        <button class="nav-btn left" type="button" (click)="prevImage()" [disabled]="images().length <= 1" aria-label="Previous image">
          ‹
        </button>

        @if (activeImage(); as img) {
          <img class="hero-img" [ngSrc]="img" width="980" height="540" alt="" priority />
        }

        <button class="nav-btn right" type="button" (click)="nextImage()" [disabled]="images().length <= 1" aria-label="Next image">
          ›
        </button>
      </div>
    </section>
  } @else {
    <p class="muted">Club not found.</p>
  }
</div>
